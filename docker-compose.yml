version: "3.9"

x-environment: &default-environment
  DOTNET_ENVIRONMENT: Production
  ASPNETCORE_ENVIRONMENT: Production
  ConnectionStrings__RabbitMQServer: rabbitmq|${RABBITMQ_DEFAULT_USER:-guest}|${RABBITMQ_DEFAULT_PASS:-change_me}
  ConnectionStrings__DefaultConnection: ...
  ConnectionStrings__ClientId: ...
  ConnectionStrings__Token: ...
  ConnectionStrings__ClientSecret: ...
  ConnectionStrings__BugSnagApiKey: ...
services:
  # Blue bot instance
  bot_blue:
    image: kendrome/egg9000bot:latest
    restart: on-failure
    environment:
      << : *default-environment
      BOT_ACTIVE: "true"
      BOT_COLOR: blue
      # Reach the co-located Site over the Docker network; the public domain cannot be hairpinned
      # back from inside a container, which silently breaks the bot's image-generation API calls.
      E9K_SITE_BASEURL: http://site_blue:5013
      # App will read from /run/secrets/ via DockerSecretsHelper
    volumes:
      # If you are not on Windows, adjust the path to your user secrets store accordingly
      # (If you get "no default credentials found" errors, check this)
      - ${APPDATA}/Microsoft/UserSecrets/DEV9001:/home/app/.microsoft/usersecrets/DEV9001:ro
    networks:
      - egg9000_network
    depends_on:
      rabbitmq:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Green bot instance
  bot_green:
    image: kendrome/egg9000bot:latest
    restart: on-failure
    environment:
      << : *default-environment
      BOT_ACTIVE: "false"
      BOT_COLOR: green
      E9K_SITE_BASEURL: http://site_blue:5013
    volumes:
      # If you are not on Windows, adjust the path to your user secrets store accordingly
      # (If you get "no default credentials found" errors, check this)
      - ${APPDATA}/Microsoft/UserSecrets/DEV9001:/home/app/.microsoft/usersecrets/DEV9001:ro
    networks:
      - egg9000_network
    depends_on:
      rabbitmq:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Blue site instance
  site_blue:
    image: kendrome/egg9000site:latest
    restart: always
    environment:
      << : *default-environment
      ASPNETCORE_URLS: http://+:5013
      SITE_ACTIVE: "false"
      SITE_COLOR: blue
      # CIDR(s) of the TLS-terminating reverse proxy (proxy-v6 network) so X-Forwarded-Proto is
      # trusted. Comma-separated; IPv4 and IPv6 both supported.
      TRUSTED_PROXY_NETWORKS: ""
    networks:
      - egg9000_network
    ports:
      - "5013:5013"
    # The Docker socket is intentionally NOT mounted and the container does NOT run as root.
    # No code on this branch uses the Docker API. If bot lifecycle management is reintroduced,
    # do NOT mount /var/run/docker.sock directly into this public container - front it with a
    # read/verb-limited docker-socket-proxy and point the client at tcp://docker-socket-proxy:2375.
    # See docs/audit/infra.md (H1).
    depends_on:
      rabbitmq:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5013/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 40s

  rabbitmq:
    image: rabbitmq:3.12-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-change_me}
    # Bot and site reach the broker by service name on egg9000_network, so the broker does not
    # need a public host port. Bind to loopback only - AMQP and the admin UI must not be exposed
    # on 0.0.0.0. Use an SSH tunnel to reach the management UI. See docs/audit/infra.md (H2).
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    networks:
      - egg9000_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

