version: "3.9"

x-environment: &default-environment
  DOTNET_ENVIRONMENT: Production
  ASPNETCORE_ENVIRONMENT: Production
  ConnectionStrings__DefaultConnection: ...
  ConnectionStrings__RabbitMQServer: ...
  ConnectionStrings__ClientId: ...
  ConnectionStrings__Token: ...
  ConnectionStrings__ClientSecret: ...
  ConnectionStrings__BugSnagApiKey: ...
  ConnectionStrings__APILinkUrl: ...
services:
  # Blue bot instance
  bot_blue:
    image: kendrome/egg9000bot:latest
    restart: on-failure
    environment:
      << : *default-environment
      BOT_ACTIVE: "true"
      BOT_COLOR: blue
      # App will read from /run/secrets/ via DockerSecretsHelper
    networks:
      - egg9000_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Green bot instance
  bot_green:
    image: kendrome/egg9000bot:latest
    restart: on-failure
    environment:
      << : *default-environment
      BOT_ACTIVE: "false"
      BOT_COLOR: green
    networks:
      - egg9000_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Blue site instance
  site_blue:
    image: kendrome/egg9000site:latest
    restart: always
    environment:
      << : *default-environment
      ASPNETCORE_URLS: http://+:5013
      SITE_ACTIVE: "false"
      SITE_COLOR: blue
      Docker__Host: unix:///var/run/docker.sock
    networks:
      - egg9000_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "5013:5013"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5013/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 40s
    volumes:
      - //./pipe/docker_engine:/var/run/docker.sock  # Docker Desktop on Windows → Linux container

