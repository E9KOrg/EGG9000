name: Bot Smoke (gated)

# Secret-bearing job. It deliberately has NO `pull_request` trigger: on pull_request the workflow
# definition that runs is the PR's copy, and for same-repo branch PRs secrets are available - so a
# branch could rewrite this job to exfiltrate the token. Triggering only on push-to-master and
# manual dispatch guarantees the running workflow is always master's reviewed version, and secrets
# are only ever exposed to trusted, already-merged code. Repository secrets are used (no Environment
# required); GitHub already withholds repo secrets from fork-triggered runs.

on:
  workflow_dispatch:
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: bot-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'
      - name: Boot bot with provided config, confirm it starts
        env:
          ConnectionStrings__Token: ${{ secrets.CI_DISCORD_TOKEN }}
          ConnectionStrings__DefaultConnection: ${{ secrets.CI_DB_CONNECTION }}
          BOT_ACTIVE: 'false'
        run: |
          # With BOT_ACTIVE=false the bot validates config and exits cleanly without connecting,
          # proving the published image boots with the supplied secrets. Replace this with a fuller
          # "connect to gateway + open DB, then exit" harness when one exists.
          dotnet build EGG9000.Bot -c Release
